name: Deploy Web App to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Wheel
        run: python -m build --wheel

      - name: Sync Browser Wheel
        run: python tools/sync_browser_wheel.py dist/*.whl

      - name: Verify Synced Wheel
        run: python tools/verify_gui_offline.py inspect-wheel dist/*.whl

      - name: Prepare Web Directory
        run: |
          mkdir public
          # Copy the web app assets
          cp -r gbdraw/web/* public/
          # Remove any prebundled wheels from the repo copy
          rm -f public/*.whl
          # Copy the built wheel file
          cp dist/*.whl public/
          # Create CNAME file for custom domain
          echo "gbdraw.app" > public/CNAME

      - name: Update deployed config with outer wheel filename and cache bust
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import re

          wheel_path = next(Path("dist").glob("*.whl"))
          config_path = Path("public/js/config.js")
          config_text = config_path.read_text(encoding="utf-8")
          cache_bust = hashlib.sha256(wheel_path.read_bytes()).hexdigest()[:12]
          config_text = re.sub(
              r'export const GBDRAW_WHEEL_NAME = ".*?";',
              f'export const GBDRAW_WHEEL_NAME = "{wheel_path.name}";',
              config_text,
              count=1,
          )
          config_text = re.sub(
              r'export const GBDRAW_WHEEL_CACHE_BUST = ".*?";',
              f'export const GBDRAW_WHEEL_CACHE_BUST = "{cache_bust}";',
              config_text,
              count=1,
          )
          config_path.write_text(config_text, encoding="utf-8")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
